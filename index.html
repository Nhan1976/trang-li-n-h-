<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Liên Hệ Cơ Quan</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    
    <style>
        /* CHỈ GIỮ LẠI ĐOẠN CODE HIỆN ĐẠI NÀY */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            width: 90%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            overflow: hidden; 
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        .header-image {
            width: 100%;
            height: 180px;
            /* Đảm bảo file coquan.jpg đã upload lên GitHub */
            background-image: url('coquan.jpg'); 
            background-size: cover;
            background-position: center;
            border-bottom: 4px solid #007bff;
            background-color: #ddd; /* Hiện màu xám nếu chưa load được ảnh */
        }

        .content { padding: 25px; }

        h1 { color: #2c3e50; font-size: 22px; margin: 15px 0 5px 0; font-weight: bold; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }

        .link-btn { 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            background: #ffffff; 
            color: #333; 
            text-decoration: none; 
            padding: 15px 20px; 
            margin: 12px 0; 
            border-radius: 12px; 
            font-weight: 600; 
            border: 1px solid #eee;
            transition: all 0.3s ease;
        }

        .link-btn i { font-size: 20px; width: 35px; text-align: left; }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            color: white !important;
        }

        /* Hiệu ứng màu riêng khi hover */
        .web:hover { background: #007bff; border-color: #007bff; }
        .facebook:hover { background: #1877f2; border-color: #1877f2; }
        .youtube:hover { background: #ff0000; border-color: #ff0000; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer { font-size: 11px; color: #bdc3c7; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Báo và Phát thanh - Truyền hình An giang</h1>
        <a href="https://angiangtv.vn" class="link-btn">🌐 Website Chính Thức</a>
        
        <a href="https://facebook.com/truyenhinhangiang" class="link-btn facebook">
            <i class="fa-brands fa-facebook"></i>Fanpage Facebook Truyền hình An Giang
        </a>
        <a href="https://www.facebook.com/angiang24gio" class="link-btn facebook">
            <i class="fa-brands fa-facebook"></i>Fanpage Facebook An Giang24H
        </a>
        <a href="https://www.youtube.com/@ATVT%E1%BB%95ngH%E1%BB%A3pAG" class="link-btn youtube">🎬 Kênh Youtube Tổng hợp</a>
        <a href="https://www.youtube.com/@angiang24gio" class="link-btn youtube">🎬 Kênh Youtube 24H</a>
    </div>
</body>
</html>
